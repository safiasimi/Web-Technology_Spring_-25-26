<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Management Page</title>
    <link rel="stylesheet" href="../Design/Design.css" />
  </head>
  <body>
    <form>
      <h3>Product Management Page</h3>

      <label for="unitPrice">Unit Price:</label><br />
      <input
        type="number"
        id="unitPrice"
        name="unitPrice"
        value="1000"
        readonly
      /><br />

      <label for="quantity">Quantity per Day:</label><br />
      <input
        type="number"
        id="quantity"
        name="quantity"
        placeholder="Enter quantity per day"
      /><br />

      <label for="totalPrice">Total Price for 30 Days:</label><br />
      <input
        type="number"
        id="totalPrice"
        name="totalPrice"
        value="0"
        readonly
      /><br />
    </form>

    <script src="../JS/Validation.js"></script>
  </body>
</html>
