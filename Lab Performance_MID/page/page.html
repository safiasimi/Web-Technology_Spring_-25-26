<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management Page</title>
    <link rel="stylesheet" href="/Lab Performance_MID/Design/Style.css">
</head>
<body>

    <div class="container">
        <fieldset>
            <legend>Product Management Page</legend>

            <div class="form-group">
                <label for="unitPrice">Unit Price:</label>
                <input type="number" id="unitPrice" value="1000" disabled>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity per Day:</label>
                <input type="number" id="quantity" placeholder="Enter quantity per day" min="0">
            </div>

            <div class="form-group">
                <label for="totalPrice">Total Price for 30 Days:</label>
                <input type="number" id="totalPrice" value="0" readonly>
            </div>
        </fieldset>
    </div>

    <script src="/Lab Performance_MID/JS/script.js"></script>
</body>
</html>
